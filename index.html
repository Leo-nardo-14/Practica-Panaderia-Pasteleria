<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería & Pastelería Delicia | Pedidos Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <a href="https://wa.me/tu-numero" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i> Pedir Delivery
    </a>

    <main class="hero">
        <div class="overlay-card">
            <header>
                <span class="badge">Abierto ahora</span>
                <h1>Panadería & Pastelería <span>Delicia</span></h1>
                <p class="slogan">El sabor de lo artesanal en tu mesa cada mañana.</p>
            </header>

            <section class="info-relevante">
                <div class="feature">
                    <i class="fas fa-bread-slice"></i>
                    <h3>Pan Recién Horneado</h3>
                    <p>Salidas diarias: 7:00 AM y 5:00 PM</p>
                </div>
                <div class="feature">
                    <i class="fas fa-motorcycle"></i>
                    <h3>Delivery Express</h3>
                    <p>Llegamos en menos de 30 min a todo el sector.</p>
                </div>
            </section>

            <footer class="cta">
                <button class="btn-primary" onclick="mostrarPromo()">Ver Promo del Día</button>
                <p id="promo-text" class="hidden">¡2x1 en Croissants hoy!</p>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
